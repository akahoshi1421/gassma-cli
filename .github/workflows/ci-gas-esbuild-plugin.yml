name: CI (gas-esbuild-plugin)

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/gas-esbuild-plugin/**'
      - 'package.json'
      - 'package-lock.json'
      - 'biome.json'
      - '.github/workflows/ci-gas-esbuild-plugin.yml'
  push:
    branches: [ main ]
    paths:
      - 'packages/gas-esbuild-plugin/**'
      - 'package.json'
      - 'package-lock.json'
      - 'biome.json'
      - '.github/workflows/ci-gas-esbuild-plugin.yml'

jobs:
  lint-gas-esbuild-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.0'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-24.11.0-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-24.11.0-
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run Biome linter (gas-esbuild-plugin)
        run: npx biome lint packages/gas-esbuild-plugin/src

      - name: Check formatting (gas-esbuild-plugin)
        run: npx biome format packages/gas-esbuild-plugin/src

  test-gas-esbuild-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.0'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-24.11.0-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-24.11.0-
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run tests (gas-esbuild-plugin)
        run: npm test -w packages/gas-esbuild-plugin

      - name: Typecheck (gas-esbuild-plugin)
        run: npm run typecheck -w packages/gas-esbuild-plugin

  build-gas-esbuild-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.0'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-24.11.0-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-24.11.0-
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build (gas-esbuild-plugin)
        run: npm run build -w packages/gas-esbuild-plugin
