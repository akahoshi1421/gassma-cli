name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.0'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-24.11.0-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-24.11.0-
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run Biome linter (cli)
        run: npm run lint -w packages/cli

      - name: Check formatting (cli)
        run: npm run format:check -w packages/cli

      - name: Run Biome linter (gas-esbuild-plugin)
        run: npx biome lint packages/gas-esbuild-plugin/src

      - name: Check formatting (gas-esbuild-plugin)
        run: npx biome format packages/gas-esbuild-plugin/src

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.0'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-24.11.0-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-24.11.0-
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run tests (cli)
        run: npm test -w packages/cli

      - name: Run type-level tests (cli, expectTypeOf)
        run: npm run test:types -w packages/cli

      - name: Typecheck (cli, tsc --noEmit, includes __test__)
        run: npm run typecheck -w packages/cli

      - name: Run tests (gas-esbuild-plugin)
        run: npm test -w packages/gas-esbuild-plugin

      - name: Typecheck (gas-esbuild-plugin)
        run: npm run typecheck -w packages/gas-esbuild-plugin

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.0'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-24.11.0-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-24.11.0-
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build (cli)
        run: npm run build -w packages/cli

      - name: Build (gas-esbuild-plugin)
        run: npm run build -w packages/gas-esbuild-plugin
